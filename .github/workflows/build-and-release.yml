name: Build and Release CPA-Helper

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - VERSION

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_BASENAME: cpa-helper

jobs:
  version:
    name: Resolve app version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      value: ${{ steps.app-version.outputs.value }}
      tag: ${{ steps.app-version.outputs.tag }}
      changed: ${{ steps.app-version.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve app version
        id: app-version
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi

          changed=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            changed=true
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            if [ -z "$BEFORE_SHA" ] || [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
              changed=true
            elif ! git cat-file -e "$BEFORE_SHA:VERSION" 2>/dev/null; then
              changed=true
            else
              previous="$(git show "$BEFORE_SHA:VERSION" | tr -d '[:space:]')"
              previous="${previous#v}"
              if [ "$previous" != "$version" ]; then
                changed=true
              fi
            fi
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push multi-platform Go image
    runs-on: ubuntu-latest
    needs: version
    if: github.ref == 'refs/heads/main' && needs.version.outputs.changed == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve container image names
        id: image-names
        shell: bash
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "ghcr=${GHCR_REGISTRY}/${owner}/${IMAGE_BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Go Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image-names.outputs.ghcr }}:${{ needs.version.outputs.tag }}
            ${{ steps.image-names.outputs.ghcr }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-frontend:
    name: Build frontend for release
    runs-on: ubuntu-latest
    needs:
      - version
      - build
    if: github.ref == 'refs/heads/main' && needs.version.outputs.changed == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error

  release-assets:
    name: Build ${{ matrix.goos }} ${{ matrix.asset_arch }} release asset
    runs-on: ubuntu-latest
    needs:
      - version
      - release-frontend
    if: github.ref == 'refs/heads/main' && needs.version.outputs.changed == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset_arch: aarch64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            asset_arch: amd64
            archive: tar.gz
          - goos: freebsd
            goarch: arm64
            asset_arch: aarch64
            archive: tar.gz
          - goos: freebsd
            goarch: amd64
            asset_arch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            asset_arch: aarch64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            asset_arch: amd64
            archive: tar.gz
          - goos: windows
            goarch: arm64
            asset_arch: aarch64
            archive: zip
          - goos: windows
            goarch: amd64
            asset_arch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Prepare embedded frontend
        shell: bash
        run: |
          rm -rf backend/internal/app/web/dist
          mkdir -p backend/internal/app/web/dist
          cp -R frontend/dist/. backend/internal/app/web/dist/

      - name: Build and package release asset
        id: package
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          ARCHIVE: ${{ matrix.archive }}
          APP_TAG: ${{ needs.version.outputs.tag }}
        run: |
          binary_name="cpa-helper"
          if [ "$GOOS" = "windows" ]; then
            binary_name="cpa-helper.exe"
          fi

          package_dir="$RUNNER_TEMP/cpa-helper-package"
          rm -rf "$package_dir" release
          mkdir -p "$package_dir" release

          (
            cd backend
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -tags embedded_frontend -trimpath -ldflags="-s -w" \
                -o "$package_dir/$binary_name" ./cmd/cpa-helper
          )

          asset_base="cpa-helper_${APP_TAG}_${GOOS}_${ASSET_ARCH}"
          if [ "$ARCHIVE" = "zip" ]; then
            asset_name="${asset_base}.zip"
            (cd "$package_dir" && zip -9 -q "$GITHUB_WORKSPACE/release/$asset_name" "$binary_name")
          else
            asset_name="${asset_base}.tar.gz"
            tar -C "$package_dir" -czf "release/$asset_name" "$binary_name"
          fi

          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-asset-${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: release/${{ steps.package.outputs.asset_name }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - release-assets
    if: github.ref == 'refs/heads/main' && needs.version.outputs.changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v6
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: release

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          APP_TAG: ${{ needs.version.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if gh release view "$APP_TAG" >/dev/null 2>&1; then
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              echo "Release $APP_TAG already exists; skipping GitHub Release creation."
              exit 0
            fi
            echo "::error::Release $APP_TAG already exists."
            exit 1
          fi

          gh release create "$APP_TAG" release/* \
            --target "$GITHUB_SHA" \
            --title "CPA-Helper $APP_TAG" \
            --generate-notes
